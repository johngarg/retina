name: Build Desktop

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-desktop:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle_script: build:desktop:macos
            artifact_name: retina-macos-bundle
            release_files: apps/desktop/src-tauri/target/release/bundle/macos/Retina.app.zip
          - os: windows-latest
            bundle_script: build:desktop:windows
            artifact_name: retina-windows-bundle
            release_files: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run backend tests
        working-directory: apps/api
        run: uv run pytest

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test

      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_P8 != ''
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop bundle
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: npm run ${{ matrix.bundle_script }}

      - name: Package macOS app bundle as zip
        if: runner.os == 'macOS'
        working-directory: apps/desktop/src-tauri/target/release/bundle/macos
        run: ditto -c -k --sequesterRsrc --keepParent Retina.app Retina.app.zip

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop/src-tauri/target/release/bundle
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_files }}
          fail_on_unmatched_files: true
          generate_release_notes: true
